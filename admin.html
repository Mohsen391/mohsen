<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — The Family Brew</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#F5EFE4; --espresso:#2C1A0E; --mocha:#5C3D2E;
    --caramel:#C8894A; --caramel-lt:#DFB07A; --steam:#F9F4EC;
    --text:#2C1A0E; --text-mid:#7A5C44; --text-lt:#B89880;
    --border:#DDD0BC; --shadow:rgba(44,26,14,0.12);
    --ff-display:'Playfair Display',Georgia,serif;
    --ff-body:'Jost',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--espresso);color:var(--cream);
    font-family:var(--ff-body);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:2rem 1.25rem 4rem;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    opacity:.5;
  }

  /* ── Login ── */
  .card{
    position:relative;z-index:1;
    background:rgba(245,239,228,.06);
    border:1px solid rgba(245,239,228,.12);
    border-radius:20px;padding:2.5rem 2rem;
    width:100%;max-width:420px;text-align:center;
  }
  .logo{font-family:var(--ff-display);font-size:1.1rem;color:var(--caramel-lt);letter-spacing:.05em;margin-bottom:1.75rem;font-style:italic;}
  #screen-login h2{font-family:var(--ff-display);font-size:1.5rem;font-weight:600;margin-bottom:.35rem;}
  #screen-login p{font-size:.82rem;color:rgba(245,239,228,.4);margin-bottom:1.75rem;}
  input[type="password"],input[type="text"]{
    width:100%;background:rgba(245,239,228,.08);
    border:1.5px solid rgba(245,239,228,.2);border-radius:10px;
    padding:.75rem 1rem;font-family:var(--ff-body);font-size:.9rem;
    color:var(--cream);outline:none;letter-spacing:.04em;
    transition:border-color .2s;margin-bottom:1rem;
  }
  input[type="password"]::placeholder,input[type="text"]::placeholder{color:rgba(245,239,228,.35);}
  input[type="password"]:focus,input[type="text"]:focus{border-color:var(--caramel);}
  .btn-login{
    width:100%;background:var(--caramel);color:var(--espresso);
    border:none;border-radius:50px;padding:.85rem;
    font-family:var(--ff-body);font-size:.9rem;font-weight:500;
    letter-spacing:.1em;cursor:pointer;transition:all .2s ease;
  }
  .btn-login:hover{background:var(--caramel-lt);transform:translateY(-1px);}
  .error-msg{font-size:.78rem;color:#f08080;margin-top:.65rem;min-height:1.2em;}

  /* ── Admin Panel ── */
  #screen-admin{display:none;width:100%;max-width:540px;position:relative;z-index:1;}

  .admin-header{text-align:center;margin-bottom:1.5rem;}
  .admin-header h1{font-family:var(--ff-display);font-size:1.6rem;color:var(--caramel-lt);font-weight:600;}
  .admin-header p{font-size:.8rem;color:rgba(245,239,228,.35);margin-top:.25rem;}

  /* Nav buttons */
  .nav-buttons{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.5rem;}
  .btn-nav{
    background:rgba(245,239,228,.08);border:1px solid rgba(245,239,228,.15);
    color:var(--cream);border-radius:12px;padding:.75rem;
    font-family:var(--ff-body);font-size:.82rem;font-weight:500;
    letter-spacing:.05em;cursor:pointer;transition:all .2s;
    text-decoration:none;display:flex;align-items:center;
    justify-content:center;gap:.4rem;
  }
  .btn-nav:hover{background:rgba(245,239,228,.15);transform:translateY(-1px);}

  /* Section blocks */
  .block{
    background:rgba(245,239,228,.06);border:1px solid rgba(245,239,228,.1);
    border-radius:16px;padding:1.25rem;margin-bottom:1rem;
  }
  .block-title{
    font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;
    color:rgba(245,239,228,.35);margin-bottom:1rem;
    display:flex;align-items:center;gap:.6rem;
  }
  .block-title::after{content:'';flex:1;height:1px;background:rgba(245,239,228,.1);}

  /* Status toggle */
  .status-row{display:flex;align-items:center;justify-content:space-between;}
  .status-label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,239,228,.35);margin-bottom:.3rem;}
  .status-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;letter-spacing:.06em;}
  .status-dot{width:9px;height:9px;border-radius:50%;background:#aaa;transition:all .3s;}
  .status-badge.open .status-dot{background:#52d18a;box-shadow:0 0 8px #52d18a;}
  .status-badge.closed .status-dot{background:#f08080;box-shadow:0 0 8px #f08080;}
  .status-badge.open{color:#a0f0c0;}
  .status-badge.closed{color:#f0a0a0;}
  .btn-toggle{
    background:rgba(245,239,228,.1);border:1px solid rgba(245,239,228,.2);
    color:var(--cream);border-radius:50px;padding:.5rem 1.2rem;
    font-family:var(--ff-body);font-size:.82rem;font-weight:500;
    letter-spacing:.06em;cursor:pointer;transition:all .2s;
  }
  .btn-toggle:hover:not(:disabled){background:rgba(245,239,228,.2);}
  .btn-toggle:disabled{opacity:.4;cursor:wait;}

  /* Orders queue */
  .queue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
  .queue-title{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,239,228,.35);display:flex;align-items:center;gap:.5rem;}
  .order-count{background:var(--caramel);color:var(--espresso);border-radius:50px;padding:.15rem .55rem;font-size:.7rem;font-weight:600;}
  .btn-refresh{background:none;border:none;color:rgba(245,239,228,.35);font-family:var(--ff-body);font-size:.72rem;cursor:pointer;letter-spacing:.06em;transition:color .2s;display:flex;align-items:center;gap:.3rem;}
  .btn-refresh:hover{color:var(--caramel-lt);}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinning{animation:spin .7s linear infinite;display:inline-block;}

  .orders-list{display:flex;flex-direction:column;gap:.65rem;}
  .order-card{
    background:rgba(245,239,228,.07);border:1px solid rgba(245,239,228,.1);
    border-radius:12px;padding:1rem 1.1rem;
    display:flex;align-items:center;gap:.9rem;
    animation:slideIn .3s ease;transition:all .4s ease;
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .order-card.done{opacity:0;transform:scale(.94);pointer-events:none;}
  .order-icon{width:38px;height:38px;border-radius:50%;background:rgba(200,137,74,.15);border:1px solid rgba(200,137,74,.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
  .order-info{flex:1;min-width:0;}
  .order-name{font-size:.92rem;font-weight:500;}
  .order-drink{font-size:.8rem;color:var(--caramel-lt);margin-top:.1rem;}
  .order-customs{font-size:.72rem;color:rgba(245,239,228,.35);margin-top:.08rem;font-style:italic;}
  .order-time{font-size:.68rem;color:rgba(245,239,228,.22);margin-top:.08rem;}
  .order-payment{font-size:.68rem;padding:.15rem .5rem;border-radius:50px;margin-top:.2rem;display:inline-block;}
  .order-payment.tab{background:rgba(200,137,74,.2);color:var(--caramel-lt);}
  .order-payment.now{background:rgba(82,209,138,.15);color:#7de0a8;}
  .btn-ready{
    background:linear-gradient(135deg,#2d9e6b,#237a54);color:#fff;
    border:none;border-radius:50px;padding:.5rem 1rem;
    font-family:var(--ff-body);font-size:.76rem;font-weight:500;
    cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
  }
  .btn-ready:hover{transform:scale(1.05);}
  .btn-ready:disabled{opacity:.5;cursor:wait;transform:none;}

  .empty-state{text-align:center;padding:2rem 1rem;color:rgba(245,239,228,.22);}
  .empty-state .icon{font-size:2rem;margin-bottom:.5rem;}
  .empty-state p{font-size:.82rem;}

  /* ── Menu Manager ── */
  .menu-categories{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem;}
  .menu-cat-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,239,228,.4);margin-bottom:.4rem;}
  .menu-items-list{display:flex;flex-direction:column;gap:.35rem;}
  .menu-item-row{
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(245,239,228,.06);border:1px solid rgba(245,239,228,.08);
    border-radius:8px;padding:.55rem .85rem;
  }
  .menu-item-name{font-size:.85rem;}
  .menu-item-cat{font-size:.68rem;color:rgba(245,239,228,.35);margin-left:.5rem;}
  .btn-del{
    background:rgba(240,80,80,.15);border:1px solid rgba(240,80,80,.2);
    color:#f08080;border-radius:6px;padding:.25rem .6rem;
    font-family:var(--ff-body);font-size:.72rem;cursor:pointer;transition:all .2s;
  }
  .btn-del:hover{background:rgba(240,80,80,.25);}

  /* Add drink form */
  .add-drink-form{display:flex;flex-direction:column;gap:.6rem;margin-top:.75rem;}
  .add-drink-row{display:flex;gap:.5rem;}
  .add-drink-form input, .add-drink-form select{
    flex:1;background:rgba(245,239,228,.08);
    border:1.5px solid rgba(245,239,228,.15);border-radius:8px;
    padding:.6rem .8rem;font-family:var(--ff-body);font-size:.85rem;
    color:var(--cream);outline:none;transition:border-color .2s;
    margin-bottom:0;width:100%;
  }
  .add-drink-form select option{background:#3a2010;color:var(--cream);}
  .add-drink-form input:focus,.add-drink-form select:focus{border-color:var(--caramel);}
  .btn-add{
    background:var(--caramel);color:var(--espresso);border:none;
    border-radius:8px;padding:.6rem 1.1rem;font-family:var(--ff-body);
    font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;
    white-space:nowrap;
  }
  .btn-add:hover{background:var(--caramel-lt);}

  /* Logout */
  .btn-logout{
    width:100%;background:none;border:1px solid rgba(245,239,228,.1);
    color:rgba(245,239,228,.3);border-radius:50px;padding:.7rem;
    font-family:var(--ff-body);font-size:.78rem;cursor:pointer;
    letter-spacing:.08em;transition:all .2s;margin-top:.5rem;
  }
  .btn-logout:hover{border-color:rgba(245,239,228,.25);color:rgba(245,239,228,.6);}

  /* Toast */
  #toast{
    position:fixed;bottom:1.5rem;left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--caramel);color:var(--espresso);
    padding:.75rem 1.5rem;border-radius:50px;font-size:.85rem;font-weight:500;
    box-shadow:0 8px 32px rgba(0,0,0,.4);
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:100;white-space:nowrap;
  }
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.error{background:#6a1a1a;color:#fdd;}

  .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;margin-right:.4rem;vertical-align:middle;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="login-card">
  <div class="logo">The Family Brew</div>
  <div id="screen-login">
    <h2>Admin Access</h2>
    <p>Enter your password to manage the café</p>
    <input type="password" id="pwd-input" placeholder="Password" autocomplete="current-password">
    <button class="btn-login" id="btn-login">Enter</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="screen-admin">

  <div class="admin-header">
    <h1>☕ Admin Panel</h1>
    <p>The Family Brew</p>
  </div>

  <!-- Navigation -->
  <div class="nav-buttons">
    <a href="index.html" class="btn-nav">☕ Ordering Page</a>
    <a href="tabs.html" class="btn-nav">📋 Tabs & Balances</a>
  </div>

  <!-- Cafe Status -->
  <div class="block">
    <div class="block-title">Café Status</div>
    <div class="status-row">
      <div>
        <div class="status-label">Currently</div>
        <div class="status-badge" id="status-badge">
          <span class="status-dot"></span>
          <span id="status-text">Checking…</span>
        </div>
      </div>
      <button class="btn-toggle" id="btn-toggle" disabled>Loading…</button>
    </div>
  </div>

  <!-- Order Queue -->
  <div class="block">
    <div class="queue-header">
      <div class="queue-title">
        Pending Orders
        <span class="order-count" id="order-count">0</span>
      </div>
      <button class="btn-refresh" id="btn-refresh">
        <span id="refresh-icon">↻</span> Refresh
      </button>
    </div>
    <div class="orders-list" id="orders-list">
      <div class="empty-state"><div class="icon">☕</div><p>Loading…</p></div>
    </div>
  </div>

  <!-- Menu Manager -->
  <div class="block">
    <div class="block-title">Menu Manager</div>
    <div id="menu-list">
      <div class="empty-state"><div class="icon">☕</div><p>Loading menu…</p></div>
    </div>
    <div class="add-drink-form">
      <div class="block-title" style="margin-top:.5rem">Add New Drink</div>
      <div class="add-drink-row">
        <input type="text" id="new-drink-name" placeholder="Drink name e.g. Oat Latte">
        <select id="new-drink-cat">
          <option value="Espresso">Espresso</option>
          <option value="Manual Brew">Manual Brew</option>
          <option value="Iced">Iced</option>
        </select>
      </div>
      <div class="add-drink-row">
        <input type="text" id="new-drink-desc" placeholder="Description e.g. Smooth & creamy">
        <input type="number" id="new-drink-price" step="0.001" min="0" value="1.000" placeholder="Price" style="max-width:90px">
        <button class="btn-add" onclick="addDrink()">+ Add</button>
      </div>
    </div>
  </div>

  <button class="btn-logout" id="btn-logout">🔒 Lock &amp; logout</button>
</div>

<div id="toast"></div>

<script>
  const SCRIPT_URL     = "https://script.google.com/macros/s/AKfycbzoZm0wT2yjQalRt2Pg6YcAGdmPwlRBrXxrEBDJkAtXAnjd3rlPsAeUTKRQUK1swlB4zg/exec";
  const ADMIN_PASSWORD = "mohsen";

  let authedPwd    = "";
  let refreshTimer = null;

  // Default menu stored in localStorage so it persists
  const DEFAULT_MENU = [
    { name:"Espresso",      cat:"Espresso",    desc:"Pure & intense",       icon:"☕", price:1.000 },
    { name:"Americano",     cat:"Espresso",    desc:"Espresso & hot water", icon:"🖤", price:1.000 },
    { name:"Cappuccino",    cat:"Espresso",    desc:"Equal thirds",         icon:"☁️", price:1.000 },
    { name:"Flat White",    cat:"Espresso",    desc:"Velvety microfoam",    icon:"🤍", price:1.000 },
    { name:"Latte",         cat:"Espresso",    desc:"Smooth & milky",       icon:"🥛", price:1.000 },
    { name:"Cortado",       cat:"Espresso",    desc:"Balanced cut",         icon:"🫧", price:1.000 },
    { name:"V60 Hot",       cat:"Manual Brew", desc:"Bright & clean",       icon:"⏳", price:1.000 },
    { name:"V60 Cold",      cat:"Manual Brew", desc:"Chilled & crisp",      icon:"🧊", price:1.000 },
    { name:"Moka Pot",      cat:"Manual Brew", desc:"Stovetop espresso",    icon:"🏺", price:1.000 },
    { name:"Iced Latte",    cat:"Iced",        desc:"Cool & creamy",        icon:"🧊", price:1.000 },
    { name:"Cold Brew",     cat:"Iced",        desc:"12-hr steep",          icon:"🌊", price:1.000 },
    { name:"Iced Americano",cat:"Iced",        desc:"Bold & refreshing",    icon:"🫗", price:1.000 },
  ];

  const ICONS = { "Espresso":"☕","Manual Brew":"⏳","Iced":"🧊" };

  function getMenu() {
    try {
      const saved = localStorage.getItem("familybrew_menu");
      return saved ? JSON.parse(saved) : DEFAULT_MENU;
    } catch(e) { return DEFAULT_MENU; }
  }

  function saveMenu(menu) {
    localStorage.setItem("familybrew_menu", JSON.stringify(menu));
  }

  // ── Login ─────────────────────────────────────────────────
  const loginCard   = document.getElementById("login-card");
  const screenAdmin = document.getElementById("screen-admin");
  const pwdInput    = document.getElementById("pwd-input");
  const btnLogin    = document.getElementById("btn-login");
  const loginError  = document.getElementById("login-error");
  const toast       = document.getElementById("toast");

  btnLogin.addEventListener("click", doLogin);
  pwdInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  function doLogin() {
    const pwd = pwdInput.value.trim();
    if (!pwd) return;
    if (pwd !== ADMIN_PASSWORD) {
      loginError.textContent = "Incorrect password.";
      pwdInput.value = "";
      pwdInput.focus();
      return;
    }
    authedPwd = pwd;
    loginCard.style.display = "none";
    screenAdmin.style.display = "block";
    loadStatus();
    loadOrders();
    renderMenuManager();
    refreshTimer = setInterval(loadOrders, 15000);
  }

  document.getElementById("btn-logout").addEventListener("click", () => {
    clearInterval(refreshTimer);
    authedPwd = "";
    screenAdmin.style.display = "none";
    loginCard.style.display = "block";
    pwdInput.value = "";
  });

  // ── Cafe Status ───────────────────────────────────────────
  async function loadStatus() {
    const btn = document.getElementById("btn-toggle");
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=status`);
      const data = await res.json();
      renderStatus(data.status);
    } catch(e) {
      btn.textContent = "Retry";
      btn.disabled = false;
      showToast("Could not load status — check Script URL", true);
    }
  }

  function renderStatus(s) {
    const isOpen = s === "Open";
    document.getElementById("status-text").textContent = s;
    document.getElementById("status-badge").className  = "status-badge " + (isOpen ? "open" : "closed");
    const btn = document.getElementById("btn-toggle");
    btn.disabled    = false;
    btn.textContent = isOpen ? "Close Café" : "Open Café";
  }

  document.getElementById("btn-toggle").addEventListener("click", async () => {
    const btn = document.getElementById("btn-toggle");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      const url  = `${SCRIPT_URL}?action=toggle&password=${encodeURIComponent(authedPwd)}`;
      const res  = await fetch(url);
      const data = await res.json();
      if (data.success) {
        renderStatus(data.status);
        showToast(data.status === "Open" ? "☕ Café is now OPEN" : "🔒 Café is now CLOSED");
      } else {
        showToast("Error: " + (data.error || "Unknown"), true);
        btn.disabled = false;
        btn.textContent = "Retry";
      }
    } catch(e) {
      showToast("Connection error — try again", true);
      btn.disabled = false;
      btn.textContent = "Retry";
      loadStatus();
    }
  });

  // ── Orders ────────────────────────────────────────────────
  document.getElementById("btn-refresh").addEventListener("click", loadOrders);

  async function loadOrders() {
    const icon = document.getElementById("refresh-icon");
    icon.classList.add("spinning");
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=orders&password=${encodeURIComponent(authedPwd)}`);
      const data = await res.json();
      if (data.success) renderOrders(data.orders);
      else showToast("Orders error: " + data.error, true);
    } catch(e) {
      showToast("Connection error loading orders", true);
    }
    icon.classList.remove("spinning");
  }

  function renderOrders(orders) {
    const list = document.getElementById("orders-list");
    document.getElementById("order-count").textContent = orders.length;
    if (!orders || orders.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">✨</div><p>No pending orders</p></div>`;
      return;
    }
    list.innerHTML = orders.map(o => `
      <div class="order-card" id="card-${o.id}">
        <div class="order-icon">☕</div>
        <div class="order-info">
          <div class="order-name">${esc(o.name)}</div>
          <div class="order-drink">${esc(o.drink)}</div>
          ${o.customs ? `<div class="order-customs">${esc(o.customs)}</div>` : ""}
          <div class="order-time">${esc(o.time)}</div>
          <div class="order-payment ${o.payment === 'Add to Tab' ? 'tab' : 'now'}">${esc(o.payment || 'Pay Now')}</div>
        </div>
        <button class="btn-ready" onclick="markReady(${o.id},'${esc(o.name)}','${esc(o.drink)}',this)">✓ Ready</button>
      </div>`).join("");
  }

  async function markReady(id, name, drink, btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=ready&password=${encodeURIComponent(authedPwd)}&id=${id}`);
      const data = await res.json();
      if (data.success) {
        const card = document.getElementById("card-" + id);
        if (card) {
          card.classList.add("done");
          setTimeout(() => {
            card.remove();
            const left = document.querySelectorAll(".order-card").length;
            document.getElementById("order-count").textContent = left;
            if (left === 0) document.getElementById("orders-list").innerHTML =
              `<div class="empty-state"><div class="icon">✨</div><p>No pending orders</p></div>`;
          }, 420);
        }
        showToast(`✓ ${name}'s ${drink} marked ready!`);
      } else {
        showToast("Error: " + data.error, true);
        btn.disabled = false; btn.textContent = "✓ Ready";
      }
    } catch(e) {
      showToast("Connection error", true);
      btn.disabled = false; btn.textContent = "✓ Ready";
    }
  }

  // ── Menu Manager ─────────────────────────────────────────
  function renderMenuManager() {
    const menu = getMenu();
    const cats = ["Espresso", "Manual Brew", "Iced"];
    const list = document.getElementById("menu-list");

    list.innerHTML = cats.map(cat => {
      const items = menu.filter(d => d.cat === cat);
      return `
        <div style="margin-bottom:1rem">
          <div class="menu-cat-label">${cat}</div>
          <div class="menu-items-list">
            ${items.length === 0
              ? `<div style="font-size:.78rem;color:rgba(245,239,228,.25);padding:.3rem .5rem">No drinks in this category</div>`
              : items.map(d => `
                <div class="menu-item-row">
                  <span style="display:flex;align-items:center;gap:.4rem;flex:1">
                    ${d.icon || "☕"}
                    <span class="menu-item-name">${esc(d.name)}</span>
                    <span class="menu-item-cat">${esc(d.desc)}</span>
                  </span>
                  <span style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
                    <span style="font-size:.7rem;color:rgba(245,239,228,.35)">KWD</span>
                    <input type="number" step="0.001" min="0" value="${(d.price||1).toFixed(3)}"
                      onchange="updatePrice('${esc(d.name)}', this.value)"
                      style="width:58px;background:rgba(245,239,228,.08);border:1px solid rgba(245,239,228,.15);
                      border-radius:6px;padding:.25rem .4rem;font-family:var(--ff-body);font-size:.78rem;
                      color:var(--cream);outline:none;text-align:center;margin-bottom:0;">
                    <button class="btn-del" onclick="deleteDrink('${esc(d.name)}')">✕</button>
                  </span>
                </div>`).join("")
            }
          </div>
        </div>`;
    }).join("");
  }

  function deleteDrink(name) {
    let menu = getMenu();
    menu = menu.filter(d => d.name !== name);
    saveMenu(menu);
    renderMenuManager();
    pushMenuToOrderPage();
    showToast(`"${name}" removed from menu`);
  }

  function updatePrice(name, value) {
    let menu = getMenu();
    const idx = menu.findIndex(d => d.name === name);
    if (idx !== -1) {
      menu[idx].price = parseFloat(value) || 1.000;
      saveMenu(menu);
      pushMenuToOrderPage();
      showToast(`"${name}" price updated to KWD ${menu[idx].price.toFixed(3)}`);
    }
  }

  function addDrink() {
    const name  = document.getElementById("new-drink-name").value.trim();
    const cat   = document.getElementById("new-drink-cat").value;
    const desc  = document.getElementById("new-drink-desc").value.trim();
    const price = parseFloat(document.getElementById("new-drink-price").value) || 1.000;
    if (!name) { showToast("Enter a drink name", true); return; }

    let menu = getMenu();
    if (menu.find(d => d.name.toLowerCase() === name.toLowerCase())) {
      showToast("Drink already exists", true); return;
    }

    const icon = cat === "Espresso" ? "☕" : cat === "Manual Brew" ? "⏳" : "🧊";
    menu.push({ name, cat, desc: desc || "New drink", icon, price });
    saveMenu(menu);
    renderMenuManager();
    pushMenuToOrderPage();
    showToast(`"${name}" added to menu!`);
    document.getElementById("new-drink-name").value = "";
    document.getElementById("new-drink-desc").value = "";
    document.getElementById("new-drink-price").value = "1.000";
  }

  // Signal the ordering page to reload menu (via localStorage event)
  function pushMenuToOrderPage() {
    localStorage.setItem("familybrew_menu_updated", Date.now().toString());
  }

  // ── Helpers ───────────────────────────────────────────────
  function esc(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = "show" + (isError ? " error" : "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = ""; }, 3500);
  }
</script>
</body>
</html>
