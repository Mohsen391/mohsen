<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — The Family Brew</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#F5EFE4; --espresso:#2C1A0E; --mocha:#5C3D2E;
    --caramel:#C8894A; --caramel-lt:#DFB07A; --steam:#F9F4EC;
    --text:#2C1A0E; --text-mid:#7A5C44; --text-lt:#B89880;
    --border:#DDD0BC; --shadow:rgba(44,26,14,0.12);
    --ff-display:'Playfair Display',Georgia,serif;
    --ff-body:'Jost',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--espresso);color:var(--cream);
    font-family:var(--ff-body);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:2rem 1.25rem 4rem;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    opacity:.5;
  }

  /* ── Login ── */
  .card{
    position:relative;z-index:1;
    background:rgba(245,239,228,.06);
    border:1px solid rgba(245,239,228,.12);
    border-radius:20px;padding:2.5rem 2rem;
    width:100%;max-width:400px;text-align:center;
  }
  .logo{
    font-family:var(--ff-display);font-size:1.1rem;
    color:var(--caramel-lt);letter-spacing:.05em;
    margin-bottom:1.75rem;font-style:italic;
  }
  #screen-login h2{font-family:var(--ff-display);font-size:1.5rem;font-weight:600;margin-bottom:.35rem;}
  #screen-login p{font-size:.82rem;color:var(--text-lt);margin-bottom:1.75rem;}
  input[type="password"]{
    width:100%;background:rgba(245,239,228,.08);
    border:1.5px solid rgba(245,239,228,.2);border-radius:10px;
    padding:.75rem 1rem;font-family:var(--ff-body);font-size:.9rem;
    color:var(--cream);outline:none;letter-spacing:.08em;
    transition:border-color .2s;margin-bottom:1rem;
  }
  input[type="password"]::placeholder{color:rgba(245,239,228,.35);}
  input[type="password"]:focus{border-color:var(--caramel);}
  .btn-login{
    width:100%;background:var(--caramel);color:var(--espresso);
    border:none;border-radius:50px;padding:.85rem;
    font-family:var(--ff-body);font-size:.9rem;font-weight:500;
    letter-spacing:.1em;cursor:pointer;transition:all .2s ease;
  }
  .btn-login:hover{background:var(--caramel-lt);transform:translateY(-1px);}
  .error-msg{font-size:.78rem;color:#f08080;margin-top:.65rem;min-height:1.2em;}

  /* ── Admin Panel ── */
  #screen-admin{display:none;width:100%;max-width:520px;position:relative;z-index:1;}

  .admin-header{
    text-align:center;margin-bottom:2rem;
  }
  .admin-header h1{
    font-family:var(--ff-display);font-size:1.6rem;
    color:var(--caramel-lt);font-weight:600;
  }
  .admin-header p{font-size:.8rem;color:rgba(245,239,228,.4);margin-top:.25rem;}

  /* Status toggle */
  .status-row{
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(245,239,228,.06);border:1px solid rgba(245,239,228,.1);
    border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.5rem;
  }
  .status-label{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,239,228,.4);}
  .status-badge{
    display:inline-flex;align-items:center;gap:.4rem;
    font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;
    transition:color .3s;
  }
  .status-dot{width:8px;height:8px;border-radius:50%;background:#aaa;transition:all .3s;}
  .status-badge.open .status-dot{background:#52d18a;box-shadow:0 0 8px #52d18a;}
  .status-badge.closed .status-dot{background:#f08080;box-shadow:0 0 8px #f08080;}
  .status-badge.open{color:#a0f0c0;}
  .status-badge.closed{color:#f0a0a0;}
  .btn-toggle{
    background:rgba(245,239,228,.1);border:1px solid rgba(245,239,228,.2);
    color:var(--cream);border-radius:50px;padding:.45rem 1.1rem;
    font-family:var(--ff-body);font-size:.78rem;font-weight:500;
    letter-spacing:.08em;cursor:pointer;transition:all .2s;
  }
  .btn-toggle:hover{background:rgba(245,239,228,.18);}

  /* Orders section */
  .section-title{
    font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(245,239,228,.35);margin-bottom:1rem;
    display:flex;align-items:center;gap:.75rem;
  }
  .section-title::after{content:'';flex:1;height:1px;background:rgba(245,239,228,.1);}
  .order-count{
    background:var(--caramel);color:var(--espresso);
    border-radius:50px;padding:.15rem .55rem;
    font-size:.7rem;font-weight:600;
  }

  /* Order cards */
  .orders-list{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.5rem;}

  .order-card{
    background:rgba(245,239,228,.07);
    border:1px solid rgba(245,239,228,.12);
    border-radius:14px;padding:1.1rem 1.25rem;
    display:flex;align-items:center;gap:1rem;
    transition:all .3s ease;
    animation:slideIn .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .order-card.completing{
    opacity:0;transform:scale(.95) translateY(-8px);
    transition:all .4s ease;
  }

  .order-icon{
    width:42px;height:42px;border-radius:50%;
    background:rgba(200,137,74,.15);border:1px solid rgba(200,137,74,.25);
    display:flex;align-items:center;justify-content:center;
    font-size:1.2rem;flex-shrink:0;
  }
  .order-info{flex:1;min-width:0;}
  .order-name{font-size:.95rem;font-weight:500;color:var(--cream);}
  .order-drink{font-size:.82rem;color:var(--caramel-lt);margin-top:.15rem;}
  .order-custom{font-size:.75rem;color:rgba(245,239,228,.4);margin-top:.1rem;font-style:italic;}
  .order-time{font-size:.7rem;color:rgba(245,239,228,.3);margin-top:.2rem;}

  .btn-ready{
    background:linear-gradient(135deg,#2d9e6b,#27835a);
    color:#fff;border:none;border-radius:50px;
    padding:.55rem 1.1rem;font-family:var(--ff-body);
    font-size:.78rem;font-weight:500;letter-spacing:.06em;
    cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
  }
  .btn-ready:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(45,158,107,.4);}
  .btn-ready:disabled{opacity:.5;cursor:wait;transform:none;}

  /* Empty state */
  .empty-state{
    text-align:center;padding:2.5rem 1rem;
    color:rgba(245,239,228,.25);
  }
  .empty-state .icon{font-size:2.5rem;margin-bottom:.75rem;}
  .empty-state p{font-size:.85rem;letter-spacing:.05em;}

  /* Refresh indicator */
  .refresh-row{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:.75rem;
  }
  .last-refresh{font-size:.7rem;color:rgba(245,239,228,.25);}
  .btn-refresh{
    background:none;border:none;color:rgba(245,239,228,.35);
    font-family:var(--ff-body);font-size:.72rem;cursor:pointer;
    letter-spacing:.08em;transition:color .2s;display:flex;align-items:center;gap:.3rem;
  }
  .btn-refresh:hover{color:var(--caramel-lt);}
  .btn-refresh.spinning svg{animation:spin .6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Logout */
  .btn-logout{
    width:100%;background:none;border:1px solid rgba(245,239,228,.1);
    color:rgba(245,239,228,.3);border-radius:50px;padding:.7rem;
    font-family:var(--ff-body);font-size:.78rem;cursor:pointer;
    letter-spacing:.08em;transition:all .2s;margin-top:.5rem;
  }
  .btn-logout:hover{border-color:rgba(245,239,228,.25);color:rgba(245,239,228,.6);}

  /* Toast */
  #toast{
    position:fixed;bottom:1.5rem;left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--caramel);color:var(--espresso);
    padding:.75rem 1.5rem;border-radius:50px;
    font-size:.85rem;font-weight:500;
    box-shadow:0 8px 32px rgba(0,0,0,.4);
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);
    z-index:100;white-space:nowrap;
  }
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.error{background:#7a1a1a;color:#fdd;}

  .spinner{
    display:inline-block;width:13px;height:13px;
    border:2px solid rgba(255,255,255,.25);border-top-color:currentColor;
    border-radius:50%;animation:spin .7s linear infinite;
    margin-right:.4rem;vertical-align:middle;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="login-card">
  <div class="logo">The Family Brew</div>
  <div id="screen-login">
    <h2>Admin Access</h2>
    <p>Enter your password to manage orders</p>
    <input type="password" id="pwd-input" placeholder="Password" autocomplete="current-password">
    <button class="btn-login" id="btn-login">Enter</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="screen-admin">

  <div class="admin-header">
    <h1>☕ Order Queue</h1>
    <p>The Family Brew — Admin</p>
  </div>

  <!-- Cafe status toggle -->
  <div class="status-row">
    <div>
      <div class="status-label">Café Status</div>
      <div class="status-badge" id="status-badge">
        <span class="status-dot"></span>
        <span id="status-text">Checking…</span>
      </div>
    </div>
    <button class="btn-toggle" id="btn-toggle" disabled>Toggle</button>
  </div>

  <!-- Orders -->
  <div class="refresh-row">
    <div class="section-title" style="margin:0;flex:1">
      Pending Orders
      <span class="order-count" id="order-count">0</span>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="loadOrders()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>

  <div class="orders-list" id="orders-list">
    <div class="empty-state">
      <div class="icon">☕</div>
      <p>Loading orders…</p>
    </div>
  </div>

  <button class="btn-logout" id="btn-logout">🔒 Lock &amp; logout</button>

</div>

<div id="toast"></div>

<script>
  const SCRIPT_URL     = "https://script.google.com/macros/s/AKfycbxph-2mBelSFps7NRb8uT5ce10Dd4X_HXc1m-DDij-qYw8DfawUv9h6kcof7ubUw2Ch/exec";
  const ADMIN_PASSWORD = "mohsen";

  let authedPwd    = "";
  let refreshTimer = null;

  // ── DOM ───────────────────────────────────────────────────
  const loginCard   = document.getElementById("login-card");
  const screenLogin = document.getElementById("screen-login");
  const screenAdmin = document.getElementById("screen-admin");
  const pwdInput    = document.getElementById("pwd-input");
  const btnLogin    = document.getElementById("btn-login");
  const loginError  = document.getElementById("login-error");
  const statusBadge = document.getElementById("status-badge");
  const statusText  = document.getElementById("status-text");
  const btnToggle   = document.getElementById("btn-toggle");
  const ordersList  = document.getElementById("orders-list");
  const orderCount  = document.getElementById("order-count");
  const btnLogout   = document.getElementById("btn-logout");
  const toast       = document.getElementById("toast");

  // ── Login ─────────────────────────────────────────────────
  btnLogin.addEventListener("click", doLogin);
  pwdInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  function doLogin() {
    const pwd = pwdInput.value.trim();
    if (!pwd) return;
    if (pwd !== ADMIN_PASSWORD) {
      loginError.textContent = "Incorrect password.";
      pwdInput.value = "";
      pwdInput.focus();
      return;
    }
    authedPwd = pwd;
    loginCard.style.display = "none";
    screenAdmin.style.display = "block";
    loadStatus();
    loadOrders();
    // Auto-refresh every 15 seconds
    refreshTimer = setInterval(loadOrders, 15000);
  }

  // ── Logout ────────────────────────────────────────────────
  btnLogout.addEventListener("click", () => {
    clearInterval(refreshTimer);
    authedPwd = "";
    screenAdmin.style.display = "none";
    loginCard.style.display = "block";
    pwdInput.value = "";
  });

  // ── Cafe Status ───────────────────────────────────────────
  async function loadStatus() {
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=status`);
      const data = await res.json();
      renderStatus(data.status);
    } catch(e) { /* silent */ }
  }

  function renderStatus(s) {
    const isOpen = s === "Open";
    statusText.textContent = s;
    statusBadge.className  = "status-badge " + (isOpen ? "open" : "closed");
    btnToggle.disabled = false;
    btnToggle.textContent = isOpen ? "Close Café" : "Open Café";
  }

  btnToggle.addEventListener("click", async () => {
    btnToggle.disabled = true;
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=toggle&password=${encodeURIComponent(authedPwd)}`);
      const data = await res.json();
      if (data.success) {
        renderStatus(data.status);
        showToast(data.status === "Open" ? "☕ Café is now OPEN" : "🔒 Café is now CLOSED");
      }
    } catch(e) { showToast("Error toggling status", true); }
    btnToggle.disabled = false;
  });

  // ── Load Orders ───────────────────────────────────────────
  async function loadOrders() {
    const btn = document.getElementById("btn-refresh");
    btn.classList.add("spinning");

    try {
      const res  = await fetch(`${SCRIPT_URL}?action=getorders&password=${encodeURIComponent(authedPwd)}`);
      const data = await res.json();

      if (data.success) {
        renderOrders(data.orders);
        document.querySelector(".last-refresh") && (document.querySelector(".last-refresh").textContent =
          "Updated " + new Date().toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit",second:"2-digit"}));
      }
    } catch(e) { /* silent */ }

    btn.classList.remove("spinning");
  }

  function renderOrders(orders) {
    orderCount.textContent = orders.length;

    if (orders.length === 0) {
      ordersList.innerHTML = `
        <div class="empty-state">
          <div class="icon">✨</div>
          <p>No pending orders right now</p>
        </div>`;
      return;
    }

    ordersList.innerHTML = orders.map(o => `
      <div class="order-card" id="card-${o.orderId}">
        <div class="order-icon">☕</div>
        <div class="order-info">
          <div class="order-name">${escHtml(o.name)}</div>
          <div class="order-drink">${escHtml(o.drink)}</div>
          ${o.customizations ? `<div class="order-custom">${escHtml(o.customizations)}</div>` : ""}
          <div class="order-time">Ordered at ${escHtml(o.time)}</div>
        </div>
        <button class="btn-ready" onclick="markReady('${o.orderId}', '${escHtml(o.name)}', '${escHtml(o.drink)}', this)">
          ✓ Ready
        </button>
      </div>
    `).join("");
  }

  // ── Mark Ready ────────────────────────────────────────────
  async function markReady(orderId, name, drink, btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      const res  = await fetch(`${SCRIPT_URL}?action=markready&password=${encodeURIComponent(authedPwd)}&orderId=${encodeURIComponent(orderId)}`);
      const data = await res.json();

      if (data.success) {
        // Animate card out
        const card = document.getElementById("card-" + orderId);
        if (card) {
          card.classList.add("completing");
          setTimeout(() => {
            card.remove();
            const remaining = ordersList.querySelectorAll(".order-card").length;
            orderCount.textContent = remaining;
            if (remaining === 0) {
              ordersList.innerHTML = `
                <div class="empty-state">
                  <div class="icon">✨</div>
                  <p>No pending orders right now</p>
                </div>`;
            }
          }, 400);
        }
        showToast(`✓ ${name}'s ${drink} marked as ready!`);
      } else {
        throw new Error(data.error);
      }
    } catch(e) {
      showToast("Error marking order ready", true);
      btn.disabled = false;
      btn.textContent = "✓ Ready";
    }
  }

  // ── Helpers ───────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = "show" + (isError ? " error" : "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = ""; }, 3500);
  }
</script>
</body>
</html>
